services:
  itemcatalogdb:
      container_name: itemcatalogdb
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=ItemCatalogDb
      ports:
        - "5433:5432"
      volumes:
        - itemcatalogdb_data:/var/lib/postgresql
  itemcatalog.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__ItemCatalogDb=Server=itemcatalogdb;Port=5432;Database=ItemCatalogDb;Username=postgres;Password=postgres;Include Error Detail=true
    depends_on:
      - itemcatalogdb
    ports:
      - "6050:8080"
      - "6150:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro